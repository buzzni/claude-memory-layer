name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test the advertised support floor (engines.node >=18) and current LTS.
        node-version: ['18', '20', '22']
    env:
      # The embedding backend is an optional native dep; skip its postinstall
      # network fetch in CI so installs stay fast and deterministic.
      CLAUDE_MEMORY_LAYER_SKIP_EMBEDDING_POSTINSTALL: '1'
      ONNXRUNTIME_NODE_INSTALL_CUDA: skip
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # The test toolchain (vitest 4 / rolldown) imports `styleText` from
      # node:util, which only exists on Node >= 20.12, so tests run on the
      # dev-supported runtimes (devEngines.runtime >= 20.19). Node 18 still
      # verifies the published engines floor via typecheck/lint/build.
      - name: Test
        if: matrix.node-version != '18'
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Architecture import boundaries
        run: npm run check:architecture
